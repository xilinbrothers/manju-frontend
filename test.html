<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>测试样式</title>
    <style>
      body {
        margin: 0;
        background-color: #0F172A;
        color: white;
        border: 10px solid red;
        padding: 20px;
      }
      h1 {
        color: blue;
      }
      .test-class {
        background-color: green;
        padding: 10px;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <h1>测试页面</h1>
    <p>这是一个测试页面，用于检查样式是否能正常应用。</p>
    <div class="test-class">这是一个带有类的 div 元素。</div>
  </body>
</html>
