services:
  mongo:
    image: mongo:7
    container_name: manju-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: manju
    volumes:
      - manju_mongo_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: manju-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongo

volumes:
  manju_mongo_data:
