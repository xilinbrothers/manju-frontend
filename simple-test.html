<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>简单测试页面</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        margin: 0;
        background-color: #0F172A;
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
        border: 10px solid red;
        padding: 20px;
      }
      
      .flex {
        display: flex;
      }
      
      .flex-col {
        flex-direction: column;
      }
      
      .items-center {
        align-items: center;
      }
      
      .justify-center {
        justify-content: center;
      }
      
      .space-y-4 {
        gap: 16px;
      }
      
      .p-5 {
        padding: 20px;
      }
      
      .min-h-screen {
        min-height: 100vh;
      }
      
      .bg-\[\#1A2333\] {
        background-color: #1A2333;
      }
      
      .rounded-2xl {
        border-radius: 16px;
      }
      
      .p-4 {
        padding: 16px;
      }
      
      .max-w-\[90\%\] {
        max-width: 90%;
      }
      
      .self-start {
        align-self: flex-start;
      }
      
      .text-\[15px\] {
        font-size: 15px;
      }
      
      .font-medium {
        font-weight: 500;
      }
      
      .leading-relaxed {
        line-height: 1.5;
      }
      
      .text-\[14px\] {
        font-size: 14px;
      }
      
      .text-gray-200 {
        color: #E5E7EB;
      }
      
      .py-2 {
        padding-top: 8px;
        padding-bottom: 8px;
      }
      
      .px-1 {
        padding-left: 4px;
        padding-right: 4px;
      }
      
      .text-xl {
        font-size: 20px;
      }
      
      .space-x-3 {
        gap: 12px;
      }
      
      .group:hover .text-gray-200 {
        color: white;
      }
      
      .pt-4 {
        padding-top: 16px;
      }
      
      .text-gray-300 {
        color: #D1D5DB;
      }
      
      .mt-auto {
        margin-top: auto;
      }
      
      .pb-6 {
        padding-bottom: 24px;
      }
      
      .w-full {
        width: 100%;
      }
      
      .py-4\.5 {
        padding-top: 18px;
        padding-bottom: 18px;
      }
      
      .bg-\[\#3B82F6\] {
        background-color: #3B82F6;
      }
      
      .hover\:bg-blue-600:hover {
        background-color: #2563EB;
      }
      
      .text-white {
        color: white;
      }
      
      .font-bold {
        font-weight: bold;
      }
      
      .rounded-full {
        border-radius: 9999px;
      }
      
      .transition-all {
        transition: all 0.2s ease;
      }
      
      .active\:scale-\[0\.98\]:active {
        transform: scale(0.98);
      }
      
      .shadow-lg {
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      }
      
      .shadow-blue-900\/20 {
        box-shadow: 0 10px 15px -3px rgba(30, 64, 175, 0.2), 0 4px 6px -2px rgba(30, 64, 175, 0.1);
      }
      
      .space-x-2 {
        gap: 8px;
      }
      
      .text-lg {
        font-size: 18px;
      }
      
      .bg-transparent {
        background-color: transparent;
      }
      
      .hover\:bg-white\/5:hover {
        background-color: rgba(255, 255, 255, 0.05);
      }
      
      .text-gray-200 {
        color: #E5E7EB;
      }
      
      .border {
        border: 1px solid;
      }
      
      .border-gray-700\/50 {
        border-color: rgba(55, 65, 81, 0.5);
      }
      
      .text-\[\#3B82F6\] {
        color: #3B82F6;
      }
    </style>
  </head>
  <body>
    <div class="flex flex-col p-5 text-white min-h-screen">
      {/* Bot Chat Bubbles */}
      <div class="space-y-4 mb-8">
        <div class="bg-[#1A2333] rounded-2xl rounded-bl-none p-4 max-w-[90%] self-start shadow-md border border-gray-800/50">
          <p class="text-[15px] font-medium leading-relaxed">
            嗨！欢迎来到漫剧订阅助手 🎬
          </p>
        </div>

        <div class="bg-[#1A2333] rounded-2xl rounded-bl-none p-4 max-w-[90%] self-start shadow-md border border-gray-800/50">
          <p class="text-[14px] leading-relaxed text-gray-200">
            这里收录了最热门的短剧、漫改作品，支持高清在线观看。
          </p>
        </div>

        {/* Feature List */}
        <div class="space-y-3 py-2 px-1">
          <div class="flex items-center space-x-3 group">
            <span class="text-xl">✨</span>
            <span class="text-[14px] font-medium text-gray-200">海量正版内容，每日更新</span>
          </div>
          <div class="flex items-center space-x-3 group">
            <span class="text-xl">🎯</span>
            <span class="text-[14px] font-medium text-gray-200">灵活订阅套餐，按需选择</span>
          </div>
          <div class="flex items-center space-x-3 group">
            <span class="text-xl">🚀</span>
            <span class="text-[14px] font-medium text-gray-200">专属观影群，抢先看新集</span>
          </div>
        </div>

        <div class="pt-4">
          <p class="text-[14px] font-medium text-gray-300">现在开始，探索你的专属片单吧！</p>
        </div>
      </div>

      {/* Buttons Container */}
      <div class="flex flex-col space-y-3.5 mt-auto pb-6">
        <button 
          class="w-full py-4.5 bg-[#3B82F6] hover:bg-blue-600 text-white font-bold rounded-full transition-all active:scale-[0.98] shadow-lg shadow-blue-900/20 flex items-center justify-center space-x-2"
        >
          <span class="text-lg">🎬</span>
          <span class="text-[16px]">查看所有剧集</span>
        </button>
        
        <button 
          class="w-full py-4.5 bg-transparent hover:bg-white/5 text-gray-200 font-bold rounded-full transition-all border border-gray-700/50 flex items-center justify-center space-x-2"
        >
          <span class="text-lg">💳</span>
          <span class="text-[16px]">我的订阅</span>
        </button>
        
        <button 
          class="w-full py-4.5 bg-transparent hover:bg-white/5 text-[#3B82F6] font-bold rounded-full transition-all border border-gray-700/50 flex items-center justify-center space-x-2"
        >
          <span class="text-lg">💬</span>
          <span class="text-[16px]">联系客服</span>
        </button>
      </div>
    </div>
  </body>
</html>
